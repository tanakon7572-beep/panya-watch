<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Punya Clinic Watch</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto;
        }

        .form-control:focus {
            border-color: #B8860B;
            box-shadow: 0 0 0 0.25rem rgba(184, 134, 11, 0.25);
        }

        .btn-gold {
            background-color: #B8860B;
            color: #fff;
            border: none;
        }

        .btn-gold:hover {
            background-color: #9b6f04;
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container auth-container">
        <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5 bg-white text-center">
            <h2 class="fw-bold mb-4">สมัครสมาชิก <span class="text-gold">Punya Clinic</span></h2>

            <div id="alertMsg" class="alert d-none"></div>

            <form id="registerForm">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Emailaddress</label>
                    <input type="text" id="email" class="form-control rounded-3 py-2" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">ชื่อ-นามสกุล</label>
                    <input type="text" id="name" class="form-control rounded-3 py-2" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" id="username" class="form-control rounded-3 py-2" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" id="password" class="form-control rounded-3 py-2" required>
                </div>
                <button type="submit" class="btn btn-gold w-100 py-3 rounded-3 fw-bold fs-5">สมัครสมาชิก</button>
            </form>

            <div class="mt-4">
                <p class="mb-0">มีบัญชีอยู่แล้ว? <a href="login.html"
                        class="text-gold fw-bold text-decoration-none">เข้าสู่ระบบ</a></p>
                <a href="index.html" class="text-secondary text-decoration-none d-block mt-3">
                    < กลับหน้าหลัก</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertMsg = document.getElementById('alertMsg');

            alertMsg.className = 'alert d-none';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name, username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    alertMsg.textContent = 'สมัครสมาชิกสำเร็จ! กำลังพากลับหน้าเข้าสู่ระบบ...';
                    alertMsg.classList.add('alert-success');
                    alertMsg.classList.remove('d-none');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    alertMsg.textContent = data.error;
                    alertMsg.classList.add('alert-danger');
                    alertMsg.classList.remove('d-none');
                }
            } catch (err) {
                alertMsg.textContent = 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้';
                alertMsg.classList.add('alert-danger');
                alertMsg.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
