<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งรหัสผ่านใหม่ - Punya Clinic Watch</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 100px auto;
        }

        .form-control:focus {
            border-color: #B8860B;
            box-shadow: 0 0 0 0.25rem rgba(184, 134, 11, 0.25);
        }

        .btn-gold {
            background-color: #B8860B;
            color: #fff;
            border: none;
        }

        .btn-gold:hover {
            background-color: #9b6f04;
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container auth-container">
        <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5 bg-white text-center">
            <h3 class="fw-bold mb-4">ตั้งรหัสผ่านใหม่</h3>

            <div id="statusMsg" class="alert d-none"></div>

            <form id="resetForm">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">รหัสผ่านใหม่</label>
                    <input type="password" id="newPassword" class="form-control rounded-3 py-2" required minlength="6">
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold">ยืนยันรหัสผ่านใหม่</label>
                    <input type="password" id="confirmPassword" class="form-control rounded-3 py-2" required
                        minlength="6">
                </div>
                <button type="submit" id="submitBtn"
                    class="btn btn-gold w-100 py-3 rounded-3 fw-bold fs-5">บันทึกรหัสผ่านใหม่</button>
            </form>

            <div class="mt-4">
                <a href="login.html" class="text-secondary text-decoration-none d-block mt-3">ไปหน้าเข้าสู่ระบบ</a>
            </div>
        </div>
    </div>

    <script>
        // ดึง Token จาก URL เช่น ?token=xxxxxx
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');

        if (!resetToken) {
            document.getElementById('resetForm').style.display = 'none';
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.classList.remove('d-none');
            statusMsg.classList.add('alert-danger');
            statusMsg.textContent = 'ลิงก์ไม่ถูกต้อง หรือหมดอายุแล้ว';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const statusMsg = document.getElementById('statusMsg');
            const submitBtn = document.getElementById('submitBtn');

            if (newPassword !== confirmPassword) {
                statusMsg.className = 'alert alert-danger';
                statusMsg.textContent = 'รหัสผ่านทั้งสองช่องไม่ตรงกัน!';
                return;
            }

            statusMsg.className = 'alert d-none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'กำลังบันทึก...';

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, newPassword })
                });

                const data = await res.json();
                statusMsg.classList.remove('d-none', 'alert-danger', 'alert-success');

                if (res.ok) {
                    statusMsg.classList.add('alert-success');
                    statusMsg.textContent = 'ตั้งรหัสผ่านใหม่สำเร็จ! คุณสามารถเข้าสู่ระบบด้วยรหัสผ่านใหม่ได้ทันที';
                    document.getElementById('resetForm').style.display = 'none'; // ซ่อนฟอร์ม
                } else {
                    statusMsg.classList.add('alert-danger');
                    statusMsg.textContent = data.error || 'เกิดข้อผิดพลาด';
                }
            } catch (err) {
                statusMsg.classList.remove('d-none');
                statusMsg.classList.add('alert-danger');
                statusMsg.textContent = 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'บันทึกรหัสผ่านใหม่';
            }
        });
    </script>
</body>

</html>
