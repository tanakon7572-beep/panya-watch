<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Punya Clinic Watch</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 100px auto;
        }

        .form-control:focus {
            border-color: #B8860B;
            box-shadow: 0 0 0 0.25rem rgba(184, 134, 11, 0.25);
        }

        .btn-gold {
            background-color: #B8860B;
            color: #fff;
            border: none;
        }

        .btn-gold:hover {
            background-color: #9b6f04;
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container auth-container">
        <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5 bg-white text-center">
            <h2 class="fw-bold mb-4">เข้าสู่ระบบ <span class="text-gold">Punya Clinic</span></h2>

            <div id="errorMsg" class="alert alert-danger d-none"></div>

            <form id="loginForm">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" id="username" class="form-control rounded-3 py-2" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" id="password" class="form-control rounded-3 py-2" required>
                </div>
                <button type="submit" class="btn btn-gold w-100 py-3 rounded-3 fw-bold fs-5">เข้าสู่ระบบ</button>
            </form>

            <div class="mt-4">
                <p class="mb-2"><a href="forgot-password.html"
                        class="text-secondary text-decoration-none">ลืมรหัสผ่านใช่หรือไม่?</a></p>
                <p class="mb-0">ยังไม่มีบัญชีใช่หรือไม่? <a href="register.html"
                        class="text-gold fw-bold text-decoration-none">สมัครสมาชิก</a></p>
                <a href="index.html" class="text-secondary text-decoration-none d-block mt-3">
                    < กลับหน้าหลัก</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.classList.add('d-none');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // เก็บท็อกเคนลง localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // ตรวจสอบสิทธิ์ว่าใช่แอดมินหรือไม่
                    const perms = data.user.permissions || [];
                    if (perms.includes('admin')) {
                        window.location.href = 'admin.html'; // ไปหน้า Dashboard แอดมิน
                    } else {
                        window.location.href = 'index.html'; // สำเร็จ ไปหน้าแรกปกติ
                    }
                } else {
                    errorMsg.textContent = data.error;
                    errorMsg.classList.remove('d-none');
                }
            } catch (err) {
                errorMsg.textContent = 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้';
                errorMsg.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
