<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - Punya Clinic Watch</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 100px auto;
        }

        .form-control:focus {
            border-color: #B8860B;
            box-shadow: 0 0 0 0.25rem rgba(184, 134, 11, 0.25);
        }

        .btn-gold {
            background-color: #B8860B;
            color: #fff;
            border: none;
        }

        .btn-gold:hover {
            background-color: #9b6f04;
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container auth-container">
        <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5 bg-white text-center">
            <h3 class="fw-bold mb-3">ลืมรหัสผ่าน ใช่หรือไม่?</h3>
            <p class="text-muted mb-4">กรุณากรอกอีเมลของคุณเพื่อรับลิงก์สำหรับรีเซ็ตรหัสผ่านใหม่</p>

            <div id="statusMsg" class="alert d-none"></div>

            <form id="forgotForm">
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold">อีเมล (Email)</label>
                    <input type="email" id="email" class="form-control rounded-3 py-2" required
                        placeholder="ป้อนที่อยู่อีเมลของคุณ">
                </div>
                <button type="submit" id="submitBtn"
                    class="btn btn-gold w-100 py-3 rounded-3 fw-bold fs-5">ส่งลิงก์รีเซ็ตรหัสผ่าน</button>
            </form>

            <div class="mt-4">
                <a href="login.html" class="text-secondary text-decoration-none d-block mt-3">
                    < กลับไปหน้าเข้าสู่ระบบ</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const statusMsg = document.getElementById('statusMsg');
            const submitBtn = document.getElementById('submitBtn');

            statusMsg.className = 'alert d-none'; // reset
            submitBtn.disabled = true;
            submitBtn.textContent = 'กำลังส่ง...';

            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                statusMsg.classList.remove('d-none', 'alert-danger', 'alert-success');

                if (res.ok) {
                    statusMsg.classList.add('alert-success');
                    statusMsg.textContent = data.message || 'ส่งลิงก์ไปที่อีเมลของคุณแล้ว (กรุณาเช็คในกล่องจดหมาย หรือ Junk Mail)';
                } else {
                    statusMsg.classList.add('alert-danger');
                    statusMsg.textContent = data.error || 'เกิดข้อผิดพลาด';
                }
            } catch (err) {
                statusMsg.classList.remove('d-none');
                statusMsg.classList.add('alert-danger');
                statusMsg.textContent = 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'ส่งลิงก์รีเซ็ตรหัสผ่าน';
            }
        });
    </script>
</body>

</html>
