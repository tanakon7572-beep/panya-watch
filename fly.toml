app = "panya-watch-app" # เปลี่ยนชื่อแอปตรงนี้เป็นชื่อที่คุณต้องการ
primary_region = "sin" # Singapore (ใกล้ไทยที่สุด)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]



